name: pondsdataupdate

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Find and display Java files
      run: |
        echo "=== Java files in repository ==="
        find . -name "*.java" -type f
        echo ""
        echo "=== First 20 lines of Bgardhdiv.java ==="
        find . -name "Bgardhdiv.java" -exec head -20 {} \;

    - name: Compile all Java files
      run: |
        mkdir -p classes
        # Try to compile with classpath if lib folder exists
        if [ -d "lib" ]; then
          javac -cp "lib/*" -d classes $(find . -name "*.java" -not -path "./classes/*")
        else
          javac -d classes $(find . -name "*.java" -not -path "./classes/*")
        fi
        echo "Compilation complete. Compiled classes:"
        find classes -name "*.class"

    - name: Run Class 1 - Bgardhdiv
      run: |
        if [ -d "lib" ]; then
          java -cp "classes:lib/*" Bgardhdiv
        else
          java -cp classes Bgardhdiv
        fi
      
    - name: Run Class 2 - Gohandiv
      run: |
        if [ -d "lib" ]; then
          java -cp "classes:lib/*" Gohandiv
        else
          java -cp classes Gohandiv
        fi
      
    - name: Run Class 3 - RohtakTest
      run: |
        if [ -d "lib" ]; then
          java -cp "classes:lib/*" RohtakTest
        else
          java -cp classes RohtakTest
        fi
      
    - name: Run Class 4 - Sampladiv
      run: |
        if [ -d "lib" ]; then
          java -cp "classes:lib/*" Sampladiv
        else
          java -cp classes Sampladiv
        fi

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
