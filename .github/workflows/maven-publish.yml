name: pondsdataupdate

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile and run all classes
      run: |
        mkdir -p classes
        javac -d classes $(find . -name "*.java" -not -path "./classes/*")
        echo "Running Bgardhdiv..."
        java -cp classes Bgardhdiv
        echo "Running Gohandiv..."
        java -cp classes Gohandiv
        echo "Running RohtakTest..."
        java -cp classes RohtakTest
        echo "Running Sampladiv..."
        java -cp classes Sampladiv

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
