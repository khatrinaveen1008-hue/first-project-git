name: pondsdataupdate

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Debug - Find all Java files
      run: |
        echo "=== Finding all Java files ==="
        find . -name "*.java" -type f
        echo ""
        echo "=== Checking Bgardhdiv.java content ==="
        find . -name "Bgardhdiv.java" -exec head -10 {} \;

    - name: Compile with Maven
      run: mvn clean compile

    - name: Debug - List compiled classes
      run: |
        echo "=== Compiled classes ==="
        find target/classes -name "*.class" | head -20

    - name: Run Class 1 - Bgardhdiv
      run: mvn exec:java -Dexec.mainClass="Bgardhdiv" -e
      continue-on-error: false
      
    - name: Run Class 2 - Gohandiv
      run: mvn exec:java -Dexec.mainClass="Gohandiv" -e
      continue-on-error: false
      
    - name: Run Class 3 - RohtakTest
      run: mvn exec:java -Dexec.mainClass="RohtakTest" -e
      continue-on-error: false
      
    - name: Run Class 4 - Sampladiv
      run: mvn exec:java -Dexec.mainClass="Sampladiv" -e
      continue-on-error: false

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
