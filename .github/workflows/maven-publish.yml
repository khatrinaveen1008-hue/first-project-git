jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Speeds up subsequent runs

    - name: Compile Project
    # This ensures all dependencies in pom.xml are downloaded and classes are built
      run: mvn clean compile

    - name: Run Data Updates
    # Use Maven Exec plugin. It automatically handles the classpath for you.
    # Replace 'com.yourpackage' with the actual package name found in your .java files.
      run: |
        mvn exec:java -Dexec.mainClass="Bgardhdiv"
        mvn exec:java -Dexec.mainClass="Gohandiv"
        mvn exec:java -Dexec.mainClass="RohtakTest"
        mvn exec:java -Dexec.mainClass="Sampladiv"

    - name: Build and Deploy
      run: mvn -B deploy -s ${{ github.workspace }}/settings.xml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
