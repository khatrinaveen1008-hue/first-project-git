name: pondsdataupdate

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github
        settings-path: ${{ github.workspace }}

    - name: Bgardhdiv.java
      run: mvn exec:java -Dexec.mainClass="com.example.Bgardhdiv"
      
    - name: Gohandiv.java
      run: mvn exec:java -Dexec.mainClass="com.example.Gohandiv"
      
    - name: RohtakTest.java
      run: mvn exec:java -Dexec.mainClass="com.example.RohtakTest"
      
    - name: Sampladiv.java
      run: mvn exec:java -Dexec.mainClass="com.example.Sampladiv"

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Publish to GitHub Packages Apache Maven
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
